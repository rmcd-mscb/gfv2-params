# Per-HRU drains-to-depression-AND-impervious fraction.
#
# Aggregates drains_imperv_binary.tif (uint8 1/255) — cells that drain into a
# depression AND are impervious. Per-HRU mean = fraction of HRU cells satisfying
# both conditions. Combined with `imperv_frac` (i.e. hru_percent_imperv) by
# derive_depstor_ratios to give PRMS `sro_to_dprst_imperv` (issue #61,
# depstor workflow item 13).

source_type: drains_imperv_frac
source_raster: "{data_root}/{fabric}/depstor_rasters/drains_imperv_binary.tif"
batch_dir: "{data_root}/{fabric}/batches"
target_layer: nhru
id_feature: nat_hru_id
output_dir: "{data_root}/{fabric}/params"
merged_file: nhm_drains_imperv_frac_params.csv
categorical: false
