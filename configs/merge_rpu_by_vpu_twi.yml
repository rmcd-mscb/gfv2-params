# Per-VPU TWI raster merge config.
#
# Inputs are per-RPU GeoTIFFs staged at input/twi/<rpu>/twi.tif by
# scripts/stage_twi.sh. Outputs land alongside the NHD merged tiles
# in shared/per_vpu/<vpu>/Twi_merged_<vpu>.tif so build_vrt.py can
# eventually compose them (follow-up).
#
# VPU 08 includes RPU 03g — same cross-VPU case as the NHD merge.


"01":
  TWI:
    rpus:
      - "input/twi/01a/twi.tif"
    output: "shared/per_vpu/01/Twi_merged_01.tif"

"02":
  TWI:
    rpus:
      - "input/twi/02a/twi.tif"
      - "input/twi/02b/twi.tif"
    output: "shared/per_vpu/02/Twi_merged_02.tif"

