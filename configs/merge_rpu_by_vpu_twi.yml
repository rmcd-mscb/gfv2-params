      - "input/twi/03c/twi.tif"
      - "input/twi/03d/twi.tif"
      - "input/twi/03e/twi.tif"
      - "input/twi/03f/twi.tif"
    output: "shared/per_vpu/03/Twi_merged_03.tif"

