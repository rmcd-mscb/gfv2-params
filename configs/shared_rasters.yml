# Unified config for the CONUS shared-raster pipeline.
# Driven by scripts/build_shared_rasters.py.
#
# These rasters live under {data_root}/work/ and are reused across every
# fabric profile; they are produced once and consumed by every downstream
# fabric-specific zonal-stats and depstor pipeline.
#
# Migration is incremental: this file's `steps:` list grows as each
# cluster of scripts is refactored to library mode. See PLANNED_STEPS in
# src/gfv2_params/shared_rasters/__init__.py for the roadmap.

# Per-VPU loop scope. Per-VPU steps iterate this list internally rather
# than being launched once per VPU. Override at the CLI with --vpus to
# scope a partial run (e.g., --vpus 01 for VPU01 validation only).
vpus:
  - "01"
  - "02"
  - "03N"
  - "03S"
  - "03W"
  - "04"
  - "05"
  - "06"
  - "07"
  - "08"
  - "09"
  - "10L"
  - "10U"
  - "11"
  - "12"
  - "13"
  - "14"
  - "15"
  - "16"
  - "17"
  - "18"

# Base output directory for the shared raster store. Steps namespace within.
output_dir: "{data_root}/work"

# Step DAG. Each entry has a `name` matched against STEP_ORDER in
# gfv2_params.shared_rasters and step-specific config. The orchestrator walks
# these in STEP_ORDER (configuration order in this list is ignored).
steps:
  # Stage 1: per-VPU NHDPlus prep (non-TWI datasets).
  - name: merge_rpu_by_vpu
    manifest: configs/merge_rpu_by_vpu.yml

  # Stage 1: per-VPU slope + aspect from merged NEDSnapshot.
  - name: compute_slope_aspect
    input_dir: "{data_root}/work/nhd_merged"
    output_dir: "{data_root}/work/nhd_merged"

  # Stage 1b: Copernicus GLO-30 fill for Canada/Mexico border HRUs. CONUS-once
  # (does not iterate vpus). Depends on the per-VPU _fixed_ NED tiles produced
  # by compute_slope_aspect.
  - name: build_border_dem

  # Stage 1c1: per-VPU HRU land mask used by the TWI pipeline. Iterates vpus
  # and rasterises the canonical CONUS gfv2_nhru_merged.gpkg (filtered by the
  # `vpu` column) onto each per-VPU Hydrodem grid.
  - name: build_vpu_landmask
    template_raster: "{data_root}/work/nhd_merged/{vpu}/Hydrodem_merged_{vpu}.tif"
    hru_gpkg: "{data_root}/gfv2/fabric/gfv2_nhru_merged.gpkg"
    hru_layer: nhru
    output_raster: "{data_root}/work/nhd_merged/{vpu}/land_mask_{vpu}.tif"

  # Stage 1c2: merged TWI, masked against the per-VPU HRU land mask.
  - name: merge_rpu_by_vpu_twi
    manifest: configs/merge_rpu_by_vpu_twi.yml

  # Stage 2a: CONUS VRT assembly. Discovers per-VPU sources by globbing
  # nhd_merged/ and lists copernicus_fill/ tiles ahead of NHDPlus tiles so
  # NHDPlus wins the overlap (GDAL last-source-wins).
  - name: build_vrt
