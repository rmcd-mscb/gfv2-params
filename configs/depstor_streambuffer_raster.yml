# Build the depression-storage stream-buffer binary raster.
#
# Reads the active fabric's segments_gpkg and rasterizes a
# `buffer_distance`-metre buffer around each stream segment onto the active
# fabric's template_raster grid.
#
# template_raster and segments_gpkg come from the active fabric profile in
# base_config.yml.

segments_layer: nsegment
landmask_raster: "{data_root}/{fabric}/depstor_rasters/land_mask.tif"
output_raster: "{data_root}/{fabric}/depstor_rasters/stream_buffer.tif"
buffer_distance: 60
