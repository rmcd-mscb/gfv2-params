# Per-HRU carea_map fraction at TWI threshold 15.6 (the `smidx_coef` input).
#
# Aggregates carea_map_t156_binary.tif (uint8 1/255) — pervious cells where
# TWI exceeds 15.6 OR the cell is on-stream storage. Per-HRU mean = fraction
# of HRU cells in carea_map. Combined with `perv_frac` by derive_depstor_ratios
# and clamped to 1.0 to give PRMS `smidx_coef` (issue #61, depstor workflow
# item 16).

source_type: carea_t156_frac
source_raster: "{data_root}/{fabric}/depstor_rasters/carea_map_t156_binary.tif"
batch_dir: "{data_root}/{fabric}/batches"
target_layer: nhru
id_feature: nat_hru_id
output_dir: "{data_root}/{fabric}/params"
merged_file: nhm_carea_t156_frac_params.csv
categorical: false
