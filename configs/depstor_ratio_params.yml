# Derive the four PRMS depstor Level-5 ratio params from merged fraction CSVs.
#
# Each fraction CSV is a gdptools exactextract output keyed by nat_hru_id with
# a `count` column = weighted cell count per HRU (uint8 mask, nodata=255). For
# every ratio listed below we compute count_numerator / count_denominator per
# HRU; partial-pixel coverage at the HRU boundary cancels, so this is the same
# as the cell-count ratio that the ArcPy reference (docs/0b_TB_depr_stor.py)
# computes via getZoneCount.
#
# clamp_to_one is set per ratio: getCarea outputs (smidx_coef, carea_max) are
# clamped at 1.0 in the ArcPy source; sro_to_dprst_* ratios are not.
#
# Division-by-zero (denominator == 0) and NaN propagation collapse to 0 per
# the ArcPy `.ix[isnull, col] = 0` convention.

input_dir: "{data_root}/{fabric}/params/merged"
output_dir: "{data_root}/{fabric}/params/merged"
id_feature: nat_hru_id
count_column: count

ratios:
  - name: sro_to_dprst_perv
    numerator_file: nhm_drains_perv_frac_params.csv
    denominator_file: nhm_perv_frac_params.csv
    output_file: nhm_sro_to_dprst_perv_params.csv
    clamp_to_one: false
  - name: sro_to_dprst_imperv
    numerator_file: nhm_drains_imperv_frac_params.csv
    denominator_file: nhm_imperv_frac_params.csv
    output_file: nhm_sro_to_dprst_imperv_params.csv
    clamp_to_one: false
  - name: smidx_coef
    numerator_file: nhm_carea_t156_frac_params.csv
    denominator_file: nhm_perv_frac_params.csv
    output_file: nhm_smidx_coef_params.csv
    clamp_to_one: true
  - name: carea_max
    numerator_file: nhm_carea_t8_frac_params.csv
    denominator_file: nhm_perv_frac_params.csv
    output_file: nhm_carea_max_params.csv
    clamp_to_one: true
