# Single source of truth for fabric identities and per-fabric inputs.
# Active fabric resolution: --fabric CLI arg -> FABRIC env var -> default_fabric.
# Process configs (configs/*.yml) are fabric-agnostic; they pull
# hru_gpkg/hru_layer (the fabric geopackage + layer, authoritative for
# prepare_fabric, the ssflux build_weights step, and gap-fill), template_raster,
# fdr_raster, segments/waterbody gpkg+layer, and id_feature (the HRU id column,
# which must exist in the fabric and flows through to the final parameter CSVs)
# from the active profile via load_config().

data_root: /caldera/hovenweep/projects/usgs/water/impd/nhgf/gfv2_param_v2
default_fabric: gfv2

fabrics:
  gfv2:
    expected_max_hru_id: 361471
    batch_size: 10000
    # template_raster + fdr_raster point at a fabric-bounds clip of the CONUS
    # fdr.vrt (here ~CONUS, since gfv2 is CONUS), staged by
    # scripts/clip_shared_to_fabric.py. The template MUST share the hydrology
    # (Lattice-B) grid with twi.vrt — carea_map rejects a template that is not
    # whole-cell aligned with TWI. The former elevation.vrt template is on the
    # DEM lattice (a fractional-cell offset from twi.vrt) and would fail that
    # check at CONUS scale. The clip is also the FDR source (open-source CONUS
    # FDR, the same data the VRT mosaics — not a per-fabric ArcPy FDR).
    # Run: pixi run --as-is python scripts/clip_shared_to_fabric.py --fabric gfv2
    template_raster: "{data_root}/gfv2/shared/gfv2_fdr.vrt"
    fdr_raster: "{data_root}/gfv2/shared/gfv2_fdr.vrt"
    # Depstor TWI source: open-source Twi_hydrodem (CONUS-complete; #94), which
    # also covers gfv2's northernmost HRUs that twi.vrt (ArcPy) misses. carea_map
    # runs in percentile mode; per-VPU thresholds are keyed by the per-HRU `vpu`
    # attribute on this fabric (no profile `vpu` scalar — gfv2 is multi-VPU).
    twi_raster: "{data_root}/shared/conus/vrt/twi_hydrodem.vrt"
    # Stream segments: one CONUS nsegment layer assembled by
    # scripts/merge_vpu_segments.py from the input/fabric/NHM_<vpu>_draft.gpkg
    # drafts (the fabric-merge notebook merges only nhru, so segments are merged
    # separately). NOTE: as of the WBAREACOMI connectivity change, segments no
    # longer feed any depstor step (the streambuffer step was retired); this layer
    # is retained for other tooling.
    # Run: pixi run --as-is python scripts/merge_vpu_segments.py --fabric gfv2
    segments_gpkg: "{data_root}/{fabric}/fabric/{fabric}_nsegment_merged.gpkg"
    segments_layer: nsegment
    # Waterbodies: shared CONUS NHDPlusV2 polygons (same source as oregon). The
    # waterbody builder reprojects to the template grid and clips to land_mask.
    waterbody_gpkg: "{data_root}/input/nhd/conus_waterbodies.gpkg"
    waterbody_layer: waterbodies
    # Connected-waterbody COMIDs distilled from NHD WBAREACOMI artificial paths
    # (see gfv2_params.download.nhd_flowlines). Drives wbody_connectivity.
    connected_comids_table: "{data_root}/input/nhd/connected_waterbody_comids.parquet"
    # Flow-through waterbody COMIDs from NHD stream/area topology (see
    # gfv2_params.download.nhd_flowthrough). Unioned with connected_comids_table
    # by wbody_connectivity to catch through-flow swamps NHD never tagged with
    # WBAREACOMI. Optional: absent -> WBAREACOMI-only behaviour.
    flowthrough_comids_table: "{data_root}/input/nhd/flowthrough_waterbody_comids.parquet"
    # HRU polygon fabric — authoritative land/domain mask for the depstor
    # builders. gfv2_params.depstor_builders.landmask rasterises this to
    # land_mask.tif (driven by scripts/build_depstor_rasters.py).
    # The per-VPU TWI scripts consume the per-VPU mask built by
    # build_vpu_landmask.py (shared/per_vpu/<vpu>/land_mask_<vpu>.tif),
    # not the CONUS depstor land_mask, because the per-VPU Hydrodem
    # footprints bulge past each VPU's HRU boundary.
    hru_gpkg: "{data_root}/{fabric}/fabric/gfv2_nhru_merged.gpkg"
    hru_layer: nhru
    # HRU id column carried through every zonal/merge step into the final
    # parameter CSVs. nat_hru_id is the national NHM id assigned during the
    # per-VPU merge (notebooks/merge_vpu_targets.py).
    id_feature: nat_hru_id

  # --- Developer / test fabric -------------------------------------------
  # gfv2_dev mirrors the CONUS `gfv2` fabric so a developer can test code
  # changes WITHOUT touching the canonical `gfv2/` products. It READS the shared
  # gfv2 inputs (the two normally-{fabric}-templated input paths, segments_gpkg
  # and hru_gpkg, are pinned to `gfv2` below); OUTPUT paths are keyed off
  # {fabric} in the process configs, so every result lands in
  # `{data_root}/gfv2_dev/` instead of `{data_root}/gfv2/`. Needs team
  # read-write on the data_root (group ACL). For the zonal/param (Stage B)
  # steps, first stage this fabric's batches:
  #   pixi run --as-is python scripts/prepare_fabric.py --fabric gfv2_dev
  # For more than one concurrent developer, copy this block to `gfv2_<name>`
  # (or point `data_root` at a personal dir) so outputs don't collide.
  gfv2_dev:
    expected_max_hru_id: 361471
    batch_size: 10000
    template_raster: "{data_root}/gfv2/shared/gfv2_fdr.vrt"
    fdr_raster: "{data_root}/gfv2/shared/gfv2_fdr.vrt"
    twi_raster: "{data_root}/shared/conus/vrt/twi_hydrodem.vrt"
    # Pinned to `gfv2` (not {fabric}) so gfv2_dev reads the shared gfv2 inputs:
    segments_gpkg: "{data_root}/gfv2/fabric/gfv2_nsegment_merged.gpkg"
    segments_layer: nsegment
    waterbody_gpkg: "{data_root}/input/nhd/conus_waterbodies.gpkg"
    waterbody_layer: waterbodies
    connected_comids_table: "{data_root}/input/nhd/connected_waterbody_comids.parquet"
    # Flow-through waterbody COMIDs from NHD stream/area topology (see
    # gfv2_params.download.nhd_flowthrough). Unioned with connected_comids_table
    # by wbody_connectivity to catch through-flow swamps NHD never tagged with
    # WBAREACOMI. Optional: absent -> WBAREACOMI-only behaviour.
    flowthrough_comids_table: "{data_root}/input/nhd/flowthrough_waterbody_comids.parquet"
    hru_gpkg: "{data_root}/gfv2/fabric/gfv2_nhru_merged.gpkg"
    hru_layer: nhru
    id_feature: nat_hru_id

  gfv2_vpu01:
    # VPU01 validation overlay (issue #38). Uses the per-VPU staged inputs
    # under shared/per_vpu/01/ and the NHM_01_draft fabric gpkg directly,
    # sidestepping the chunked CONUS reproject (issue #41).
    expected_max_hru_id: 11278
    batch_size: 2000
    template_raster: "{data_root}/shared/per_vpu/01/Hydrodem_merged_01.tif"
    fdr_raster: "{data_root}/shared/per_vpu/01/Fdr_merged_01.tif"
    twi_raster: "{data_root}/shared/per_vpu/01/Twi_merged_01.tif"
    segments_gpkg: "{data_root}/input/fabric/NHM_01_draft.gpkg"
    waterbody_gpkg: "{data_root}/input/fabric/NHM_01_draft.gpkg"
    waterbody_layer: wbs
    # No `connected_comids_table`: the `wbs` layer has no COMID/member_comid
    # column, so the WBAREACOMI join cannot run. The depstor
    # `wbody_connectivity`/`dprst` steps therefore fail-fast on this profile —
    # use the `gfv2` profile for depstor validation.
    hru_gpkg: "{data_root}/{fabric}/fabric/gfv2_vpu01_nhru.gpkg"
    hru_layer: nhru
    id_feature: nat_hru_id

  oregon:
    expected_max_hru_id: 16814
    batch_size: 10000
    # Oregon's pre-merged fabric uses `hru_id` (contiguous 1..16814, matching
    # expected_max_hru_id) as its HRU id column — it has no `nat_hru_id`.
    id_feature: hru_id
    # Single-file fabric: one gpkg holds nhru/nsegment/... layers. hru_gpkg is
    # authoritative for prepare_fabric, the ssflux build_weights step, and
    # gap-fill (merge_and_fill_params) — no {fabric}_nhru_merged.gpkg naming
    # convention. segments_gpkg points at this same file (segments_layer:
    # nsegment).
    hru_gpkg: "{data_root}/oregon/fabric/model_layers 9.gpkg"
    hru_layer: nhru
    # --- depstor inputs (active; see issue #90) ---
    # template_raster + fdr_raster both point at a fabric-bounds clip of the
    # CONUS fdr.vrt, staged by scripts/clip_shared_to_fabric.py. Every depstor
    # builder sizes its arrays to the template grid, so clipping scopes compute
    # to the fabric extent (~0.56B cells here vs ~15B CONUS) while staying
    # VPU-agnostic (works for fabrics that straddle VPU boundaries). The clip
    # comes from fdr.vrt — the hydrology (Lattice-B) grid that carea_map requires
    # the template to share with twi.vrt; elevation.vrt is on a different lattice.
    # The same VRT serves as fdr_raster: routing's whole-source reproject_match
    # then reads only the fabric window, not the full ~18 GB CONUS FDR.
    # Run: pixi run --as-is python scripts/clip_shared_to_fabric.py --fabric oregon
    template_raster: "{data_root}/oregon/shared/oregon_fdr.vrt"
    fdr_raster: "{data_root}/oregon/shared/oregon_fdr.vrt"
    # Single-VPU fabric: declare the VPU so vpu_id is a constant fill and the
    # per-VPU reference threshold resolves to VPU 17.
    vpu: "17"
    # Depstor TWI source: open-source Twi_hydrodem (CONUS-complete; #94).
    # carea_map runs in percentile mode (threshold_mode: percentile,
    # reference_scope: vpu in depstor_rasters.yml), deriving the TWI cutoff from
    # the data, so carea_max/smidx_coef are no longer degenerate over VPU 17 —
    # this resolves the former #94 caveat. Reference table:
    # twi_reference_percentiles.hydrodem.csv.
    twi_raster: "{data_root}/shared/conus/vrt/twi_hydrodem.vrt"
    segments_gpkg: "{data_root}/oregon/fabric/model_layers 9.gpkg"
    segments_layer: nsegment
    # CONUS NHDPlusV2 waterbodies (POLYGON, EPSG:5070); the waterbody builder
    # reprojects to the template grid and clips to the Oregon land mask.
    waterbody_gpkg: "{data_root}/input/nhd/conus_waterbodies.gpkg"
    waterbody_layer: waterbodies
    # Connected-waterbody COMIDs distilled from NHD WBAREACOMI artificial paths
    # (see gfv2_params.download.nhd_flowlines). Drives wbody_connectivity.
    connected_comids_table: "{data_root}/input/nhd/connected_waterbody_comids.parquet"

  tjc:
    # Small regional fabric inside VPU 12 (Texas-Gulf); pre-merged single gpkg
    # (oregon-style). 1584 HRUs / 807 nsegment. CRS EPSG:5070 (the gpkg's WKT
    # is the "USGS_version" Albers but resolves to 5070 exactly).
    expected_max_hru_id: 1584
    batch_size: 10000
    # model_hru_idx is the contiguous 1..1584 local index — use it, NOT nhm_id
    # (the national NHM id 73262..76110, which is unique but has 1265 gaps and
    # would make gap-fill see ~74k phantom missing rows).
    id_feature: model_hru_idx
    # Single-file fabric: one gpkg holds nhru/nsegment/domain. hru_gpkg is
    # authoritative for prepare_fabric, the ssflux build_weights step, and
    # gap-fill; segments_gpkg points at the same file.
    hru_gpkg: "{data_root}/{fabric}/fabric/tjc.gpkg"
    hru_layer: nhru
    # --- depstor inputs ---
    # template_raster + fdr_raster: fabric-bounds clip of the CONUS fdr.vrt,
    # staged by scripts/clip_shared_to_fabric.py (sizes depstor compute to the
    # fabric extent and shares the hydrology lattice carea_map requires vs twi).
    #   pixi run --as-is python scripts/clip_shared_to_fabric.py --fabric tjc
    template_raster: "{data_root}/{fabric}/shared/{fabric}_fdr.vrt"
    fdr_raster: "{data_root}/{fabric}/shared/{fabric}_fdr.vrt"
    # Open-source Twi_hydrodem; carea_map runs in percentile mode (the default
    # in depstor_rasters.yml). VPU 12 thresholds are in
    # twi_reference_percentiles.hydrodem.csv (t_carea~9.93, t_smidx~16.11).
    twi_raster: "{data_root}/shared/conus/vrt/twi_hydrodem.vrt"
    # Single-VPU fabric: declare the VPU so vpu_id is a constant fill and the
    # per-VPU reference threshold resolves to VPU 12.
    vpu: "12"
    segments_gpkg: "{data_root}/{fabric}/fabric/tjc.gpkg"
    segments_layer: nsegment
    # Shared CONUS NHDPlusV2 waterbodies; the waterbody builder reprojects to
    # the template grid and clips to the tjc land mask.
    waterbody_gpkg: "{data_root}/input/nhd/conus_waterbodies.gpkg"
    waterbody_layer: waterbodies
    # Connected-waterbody COMIDs distilled from NHD WBAREACOMI artificial paths
    # (see gfv2_params.download.nhd_flowlines). Drives wbody_connectivity.
    connected_comids_table: "{data_root}/input/nhd/connected_waterbody_comids.parquet"
