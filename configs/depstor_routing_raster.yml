# Build the drains-to-depression binary raster via WhiteboxTools Watershed.
#
# Reads the active fabric's FDR raster (D8 flow direction, Esri pointer
# encoding), reprojects onto the dprst grid (rioxarray.reproject_match), and
# WhiteboxTools delineates which depression each cell drains into. The
# resulting per-depression labels are collapsed to uint8 binary
# (1 = drains to any depression, 255 = no/nodata).
#
# template_raster and fdr_raster come from the active fabric profile in
# base_config.yml.

dprst_raster: "{data_root}/{fabric}/depstor_rasters/dprst_binary.tif"
output_raster: "{data_root}/{fabric}/depstor_rasters/drains_to_dprst.tif"
keep_intermediates: false
