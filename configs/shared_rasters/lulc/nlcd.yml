source_type: lulc
lulc_source: nlcd
scenario: observed
year: 2021

source_raster: "{data_root}/input/lulc_veg/{lulc_source}/nlcd_{year}_land_cover.tif"
canopy_raster: "{data_root}/input/lulc_veg/{lulc_source}/nlcd_{year}_tree_canopy.tif"
# No keep raster for NLCD; evergreen retention derived from crosswalk
crosswalk_file: "crosswalks/nlcd_nhm.csv"

batch_dir: "{data_root}/{fabric}/batches"
target_layer: nhru
id_feature: nat_hru_id
output_dir: "{data_root}/{fabric}/params"
merged_file: nhm_lulc_{lulc_source}_params.csv
categorical: true
