# Build carea_map binary rasters at the two PRMS TWI thresholds.
#
# A cell is 1 in the output where it is pervious AND either (a) TWI exceeds
# the configured threshold or (b) the cell is classified as on-stream storage;
# 255 otherwise. Mirrors `getCareaMap` in the ArcPy reference at
# docs/0b_TB_depr_stor.py:315-350 but in binary form — HRU identity is
# recovered at zonal-stats time via gdptools polygon overlay.
#
# TWI input comes from the active fabric profile (twi_raster) and is reprojected
# on the fly to the template grid via rasterio WarpedVRT (origins are pixel-
# aligned on the same 30 m grid, so nearest-neighbour resampling is exact).
#
# Two thresholds per the ArcPy source (docs/0b_TB_depr_stor.py:239, 261) and
# tm6b10 (docs/0b_TB_depr_stor.py says "see get_smidx and carea_max function"):
#   * 8.0  -> carea_map_t8_binary.tif  -> feeds PRMS `carea_max`
#   * 15.6 -> carea_map_t156_binary.tif -> feeds PRMS `smidx_coef`
# Both rasters are produced in a single run (same inputs, no IO duplication).

perv_raster: "{data_root}/{fabric}/depstor_rasters/perv_binary.tif"
onstream_raster: "{data_root}/{fabric}/depstor_rasters/onstream_binary.tif"
landmask_raster: "{data_root}/{fabric}/depstor_rasters/land_mask.tif"

threshold_carea_max: 8.0
output_raster_carea_max: "{data_root}/{fabric}/depstor_rasters/carea_map_t8_binary.tif"

threshold_smidx: 15.6
output_raster_smidx: "{data_root}/{fabric}/depstor_rasters/carea_map_t156_binary.tif"
