# Build the per-VPU HRU-fabric land mask used by the TWI pipeline.
#
# Rasterises HRUs filtered to `vpu == <vpu>` onto the per-VPU Hydrodem grid
# (Hydrodem_merged_<vpu>.tif) -> work/nhd_merged/<vpu>/land_mask_<vpu>.tif.
# Every TWI consumer (merge_rpu_by_vpu TWI case, compute_dem_derivatives)
# clips against this mask so the per-VPU Hydrodem bulges past this VPU's
# HRUs never leak into the TWI footprint.
#
# `hru_gpkg` and `hru_layer` come from the active fabric profile in
# base_config.yml. The template is the per-VPU Hydrodem (not the elevation
# VRT), because each TWI product is per-VPU.

template_raster: "{data_root}/work/nhd_merged/{vpu}/Hydrodem_merged_{vpu}.tif"
output_raster: "{data_root}/work/nhd_merged/{vpu}/land_mask_{vpu}.tif"
