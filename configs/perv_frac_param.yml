# Per-HRU pervious-area fraction.
# Aggregates perv_binary.tif (uint8 0/1) — cells that are NOT impervious and
# NOT depression-storage. Per-HRU mean = fraction of HRU classified as
# pervious (PRMS-standard interpretation; downstream `hru_area_perv` is
# `hru_area * perv_frac`). Numerically equivalent to
# 1 - imperv_frac - dprst_frac; produced as a raster because Levels 4-5 of
# the depstor workflow consume it directly (see docs/depstor_workflow.md and
# issue #61).

source_type: perv_frac
source_raster: "{data_root}/{fabric}/depstor_rasters/perv_binary.tif"
batch_dir: "{data_root}/{fabric}/batches"
target_layer: nhru
id_feature: nat_hru_id
output_dir: "{data_root}/{fabric}/params"
merged_file: nhm_perv_frac_params.csv
categorical: false
