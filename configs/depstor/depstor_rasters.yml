# Build the full depression-storage raster stack in dependency order.
# Single source of truth for the depstor generation pipeline — replaces the 10
# old configs/depstor_*_raster.yml files. Driver: scripts/build_depstor_rasters.py
# (uses src/gfv2_params/depstor_builders/).
#
# Path templating: {data_root} and {fabric} are resolved by load_config() against
# the active fabric profile in base_config.yml. All step outputs are written
# into output_dir.
#
# Step ordering is locked in src/gfv2_params/depstor_builders/__init__.py
# (STEP_ORDER); landmask MUST run first and every step masks against it. The
# orchestrator validates upstream outputs before running each step and supports
# --step <name> / --from <name> for selective re-runs.

output_dir: "{data_root}/{fabric}/depstor_rasters"

# Source rasters that are NOT per-fabric. The NLCD source is the same across
# every fabric (CONUS coverage), so it lives at the step level rather than in
# every fabric profile. Override via the imperv step's `source` key if needed.
imperv_source: "{data_root}/input/lulc/nlcd_annual_imperv/Annual_NLCD_FctImp_2015_CU_C1V1.tif"

steps:
  - name: landmask
    output: land_mask.tif

  - name: imperv
    threshold: 50
    output: imperv_binary.tif

  - name: waterbody
    min_area_threshold: 900.0
    outputs:
      binary: wbody_binary.tif
      regions: wbody_regions.tif

  - name: wbody_connectivity
    output: connected_wbody.tif

  - name: dprst
    outputs:
      dprst: dprst_binary.tif
      onstream: onstream_binary.tif

  - name: perv
    output: perv_binary.tif

  - name: hru_id
    output: hru_id.tif

  - name: vpu_id
    output: vpu_id.tif

  - name: routing
    keep_intermediates: false
    output: drains_to_dprst.tif

  - name: routing_hru
    output: drains_to_dprst_hru.tif

  - name: drains_perv
    inputs: [drains_to_dprst_hru, hru_id, perv]
    output_key: drains_perv
    output: drains_perv_binary.tif

  - name: drains_imperv
    inputs: [drains_to_dprst_hru, hru_id, imperv]
    output_key: drains_imperv
    output: drains_imperv_binary.tif

  - name: carea_map
    # threshold_mode: absolute (legacy 8.0/15.6, ArcPy TWI) | percentile (#55).
    # Percentile uses reference_table: below; twi_raster (in the fabric profile)
    # and reference_table must be set to the same source together — there is no
    # auto-selection or guard for the pairing.
    threshold_mode: percentile
    reference_scope: vpu # vpu | conus
    reference_table: "{data_root}/shared/conus/twi_reference_percentiles.hydrodem.csv"
    # Used only when threshold_mode: absolute
    thresholds:
      carea_max: 8.0
      smidx: 15.6
    outputs:
      carea_max: carea_map_t8_binary.tif
      smidx: carea_map_t156_binary.tif
